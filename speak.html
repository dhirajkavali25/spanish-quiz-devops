<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Quiz Pro</title>
    <!-- Ensure this filename matches your CSS file exactly -->
    <link rel="stylesheet" href="Voicestyle.css">
</head>
<body>

    <div class="quiz-container">
        <div class="header">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="stats">
                <p id="score-display">Score: <span>0</span></p>
                <p id="streak-display">Streak: <span>0</span> 🔥</p>
            </div>
        </div>

        <h1 id="question-text">Ready to begin?</h1>
        
        <div id="options-container"></div>

        <button id="start-btn">START SESSION</button>
    </div>

    <!-- Ensure this filename matches your JS file exactly -->
    <script src="voice.js"></script>
</body>
</html>
